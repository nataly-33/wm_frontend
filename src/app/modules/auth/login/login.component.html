<div class="login-page">
  <div class="login-card">
    <!-- Brand -->
    <div class="brand-header">
      <div class="brand-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <path d="M17.5 14v6M14.5 17h6"/>
        </svg>
      </div>
      <h1 class="brand-name">WorkflowManager</h1>
      <p class="brand-tagline">Sistema de Gestion de Tramites</p>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="card-alert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <!-- LOGIN FORM -->
    <div *ngIf="!showRegistro" class="form-section">
      <h2 class="form-section-title">Iniciar Sesion</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input
            id="login-email"
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            class="form-input"
            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          />
          <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-text">
            Email invalido
          </small>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Contrasena</label>
          <input
            id="login-password"
            type="password"
            formControlName="password"
            placeholder="Minimo 6 caracteres"
            class="form-input"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-text">
            La contrasena debe tener minimo 6 caracteres
          </small>
        </div>

        <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
          {{ isLoading ? 'Iniciando sesion...' : 'Iniciar Sesion' }}
        </button>
      </form>

      <div class="toggle-section">
        No tienes cuenta?
        <button type="button" class="toggle-btn" (click)="toggleForm()">Registrarse aqui</button>
      </div>
    </div>

    <!-- REGISTRO FORM -->
    <div *ngIf="showRegistro" class="form-section">
      <h2 class="form-section-title">Crear Nueva Empresa</h2>

      <form [formGroup]="registroForm" (ngSubmit)="onRegistro()">
        <div class="form-group">
          <label class="form-label" for="empresa-name">Nombre de la Empresa</label>
          <input
            id="empresa-name"
            type="text"
            formControlName="nombreEmpresa"
            placeholder="Nombre de la empresa"
            class="form-input"
            [class.is-invalid]="registroForm.get('nombreEmpresa')?.invalid && registroForm.get('nombreEmpresa')?.touched"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="admin-name">Nombre del Administrador</label>
          <input
            id="admin-name"
            type="text"
            formControlName="nombreAdmin"
            placeholder="Tu nombre completo"
            class="form-input"
            [class.is-invalid]="registroForm.get('nombreAdmin')?.invalid && registroForm.get('nombreAdmin')?.touched"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="registro-email">Email</label>
          <input
            id="registro-email"
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            class="form-input"
            [class.is-invalid]="registroForm.get('email')?.invalid && registroForm.get('email')?.touched"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="registro-password">Contrasena</label>
          <input
            id="registro-password"
            type="password"
            formControlName="password"
            placeholder="Minimo 6 caracteres"
            class="form-input"
            [class.is-invalid]="registroForm.get('password')?.invalid && registroForm.get('password')?.touched"
          />
        </div>

        <button type="submit" class="btn-login" [disabled]="registroForm.invalid || isLoading">
          {{ isLoading ? 'Registrando...' : 'Registrarse' }}
        </button>
      </form>

      <div class="toggle-section">
        Ya tienes cuenta?
        <button type="button" class="toggle-btn" (click)="toggleForm()">Inicia sesion aqui</button>
      </div>
    </div>
  </div>
</div>
