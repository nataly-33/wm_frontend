<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Formularios por nodo</h1>
      <p class="page-subtitle">Dia 3 - Admin Departamento</p>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <section class="panel-light" *ngIf="gruposVista.length > 0">
    <h3>Listado de formularios de mi departamento</h3>
    <div class="group-list">
      <article class="policy-group" *ngFor="let grupo of gruposVista">
        <h4>{{ grupo.politicaNombre }}</h4>
        <div class="form-list">
          <div class="form-item" *ngFor="let item of grupo.formularios">
            <div>
              <strong>{{ item.nodoNombre }}</strong>
              <p>{{ item.formulario?.nombre || 'Sin formulario creado' }}</p>
            </div>

            <div class="item-actions">
              <button class="btn btn-secondary mini" (click)="editarDesdeListado(item)">
                {{ item.formulario ? 'Editar' : 'Crear' }}
              </button>
              <button
                *ngIf="item.formulario"
                class="btn btn-danger mini"
                (click)="eliminarDesdeListado(item)"
                [disabled]="guardando"
              >
                Eliminar
              </button>
            </div>
          </div>
        </div>
      </article>
    </div>
  </section>

  <section class="panel-light">
    <div class="selectors">
      <select class="form-input light" [value]="politicaId" (change)="onPoliticaChange($event)">
        <option value="">Selecciona politica</option>
        <option *ngFor="let p of politicas" [value]="p.id">{{ p.nombre }}</option>
      </select>
      <select class="form-input light" [value]="nodoId" (change)="onNodoChange($event)">
        <option value="">Selecciona nodo</option>
        <option *ngFor="let n of nodos" [value]="n.id">{{ n.nombre }} ({{ n.tipo }})</option>
      </select>
    </div>
  </section>

  <form class="panel-light" [formGroup]="form" (ngSubmit)="guardar()">
    <h3>Editor de formulario</h3>
    <div class="form-group">
      <label class="form-label">Nombre del formulario</label>
      <input class="form-input light" formControlName="nombre" />
    </div>

    <div formArrayName="campos" class="campo-list">
      <div class="campo-item" *ngFor="let campo of campos.controls; let i = index" [formGroupName]="i">
        <input class="form-input light" formControlName="nombre" placeholder="nombre tecnico" />
        <input class="form-input light" formControlName="etiqueta" placeholder="etiqueta" />
        <select class="form-input light" formControlName="tipo">
          <option value="TEXTO">TEXTO</option>
          <option value="NUMERO">NUMERO</option>
          <option value="FECHA">FECHA</option>
          <option value="SELECCION">SELECCION</option>
          <option value="ARCHIVO">ARCHIVO</option>
          <option value="IMAGEN">IMAGEN</option>
        </select>
        <input class="form-input light" formControlName="opcionesRaw" placeholder="opciones: A,B,C" />
        <label><input type="checkbox" formControlName="requerido" /> Requerido</label>
        <label><input type="checkbox" formControlName="esCampoPrioridad" /> Campo prioridad</label>
        <button type="button" class="btn btn-danger mini" (click)="quitarCampo(i)">Quitar</button>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-secondary" (click)="agregarCampo()">Agregar campo</button>
      <button type="submit" class="btn btn-primary" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : (formularioId ? 'Actualizar formulario' : 'Crear formulario') }}
      </button>
    </div>
  </form>
</div>
