<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Monitor de politicas</h1>
      <p class="page-subtitle">Base para semaforo en tiempo real (Dia 6)</p>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div *ngIf="cargando" class="loading-state"><div class="spinner"></div><p>Cargando monitor...</p></div>

  <div class="monitor-grid" *ngIf="!cargando && politicas.length">
    <article class="monitor-card" *ngFor="let p of politicas">
      <h3>{{ p.nombre }}</h3>
      <p>{{ p.descripcion }}</p>
      <div class="status">
        <span class="label">Estado:</span>
        <span class="value">{{ p.estado }}</span>
      </div>
    </article>
  </div>

  <div class="sockets-panel" *ngIf="alertas.length > 0">
    <h3>Alertas en tiempo real (WebSocket)</h3>
    <div class="alerta" *ngFor="let a of alertas">
      <span class="badge" [ngClass]="a.estado">{{ a.estado }}</span>
      Trámite {{ a.tramiteId | slice:0:8 }} cambió su estado en <strong>{{ a.politica }}</strong>
    </div>
  </div>
</div>
