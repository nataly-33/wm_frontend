<div class="page-container">
  <div class="page-header">
    <button class="btn btn-secondary" routerLink="/funcionario/tareas">← Volver</button>
    <div>
      <h1 class="page-title">Ejecutar Tarea</h1>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-error">
    <span>{{ error }}</span>
  </div>

  <div *ngIf="cargando" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando tarea...</p>
  </div>

  <div class="form-container">
    <h3>Rellenar Formulario</h3>
    <p *ngIf="formulario">{{ formulario.nombre }}</p>
    <p *ngIf="!formulario">Este nodo no tiene formulario. Selecciona/escribe la decisión manual.</p>

    <div *ngIf="cargandoFormulario" class="loading-inline">Cargando formulario...</div>

    <ng-container *ngIf="formulario">
      <div class="form-group" *ngFor="let campo of formulario.campos">
        <label class="form-label">{{ campo.etiqueta }}</label>

        <input
          *ngIf="campo.tipo === 'TEXTO'"
          type="text"
          class="form-input"
          [(ngModel)]="respuesta[campo.nombre]"
          [required]="campo.requerido"
        />

        <input
          *ngIf="campo.tipo === 'NUMERO'"
          type="number"
          class="form-input"
          [(ngModel)]="respuesta[campo.nombre]"
          [required]="campo.requerido"
        />

        <input
          *ngIf="campo.tipo === 'FECHA'"
          type="date"
          class="form-input"
          [(ngModel)]="respuesta[campo.nombre]"
          [required]="campo.requerido"
        />

        <select
          *ngIf="campo.tipo === 'SELECCION'"
          class="form-input"
          [(ngModel)]="respuesta[campo.nombre]"
        >
          <option value="">Selecciona una opción</option>
          <option *ngFor="let opcion of campo.opciones" [value]="opcion">{{ opcion }}</option>
        </select>

        <input
          *ngIf="campo.tipo === 'ARCHIVO' || campo.tipo === 'IMAGEN'"
          type="text"
          class="form-input"
          [(ngModel)]="respuesta[campo.nombre]"
          placeholder="URL del archivo"
        />
      </div>
    </ng-container>

    <div class="form-group" *ngIf="!formulario && !cargandoFormulario">
      <label class="form-label">Decisión</label>
      <input
        type="text"
        class="form-input"
        [(ngModel)]="decisionManual"
        placeholder="Ej. Aprobado / Rechazado"
      />
    </div>

    <div class="form-group">
      <label class="form-label">Observaciones (Requerido solo para rechazar tarea firmemente)</label>
      <textarea class="form-input" [(ngModel)]="observaciones" rows="3"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-primary" (click)="completar()" [disabled]="guardando">✅ Completar</button>
      <button class="btn btn-danger" (click)="rechazar()" [disabled]="guardando">❌ Rechazar</button>
    </div>
  </div>
</div>
